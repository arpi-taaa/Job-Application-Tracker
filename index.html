<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link rel="icon" type="image/png" href="./Assets/job-search.png">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-slate-800 mb-8">Job Application Tracker</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-100">
                <p class="text-slate-500 font-semibold text-sm">Total</p>
                <h2 id="total-count" class="text-4xl font-bold text-slate-800 mt-2">0</h2>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-100">
                <p class="text-slate-500 font-semibold text-sm">Interview</p>
                <h2 id="interview-count" class="text-4xl font-bold text-emerald-500 mt-2">0</h2>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-100">
                <p class="text-slate-500 font-semibold text-sm">Rejected</p>
                <h2 id="rejected-count" class="text-4xl font-bold text-rose-500 mt-2">0</h2>
            </div>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-slate-800">Available Jobs</h2>
            <p class="text-slate-500 font-medium"><span id="jobs-count">0</span> jobs</p>
        </div>

        <div class="flex gap-2 mb-8">
            <button onclick="filterBy('all')" id="btn-all" class="btn btn-sm bg-blue-600 border-none text-white hover:bg-blue-700">All</button>
            <button onclick="filterBy('interview')" id="btn-interview" class="btn btn-sm bg-white border-slate-200 text-slate-600 hover:bg-slate-50">Interview</button>
            <button onclick="filterBy('rejected')" id="btn-rejected" class="btn btn-sm bg-white border-slate-200 text-slate-600 hover:bg-slate-50">Rejected</button>
        </div>

        <div id="jobs-wrapper" class="space-y-6">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
